[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.26"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true
ffi = true

[profile.default.fuzz]
runs = 256

[profile.ci]
fuzz = { runs = 512 }

[profile.core-only]
src = "src"

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true

# Explorer verification (rate limit: Etherscan free tier = 5 calls/sec)
# Use --delay 1 on forge script/verify to stay under limit (see AGENTS.md)
[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 11155111 }
# Unichain Sepolia (Blockscout-compatible); key may be Blockscout/Uniscan token, not etherscan.io
unichain_sepolia = { key = "${UNICHAIN_ETHERSCAN_API_KEY}", chain = 1301, url = "https://unichain-sepolia.blockscout.com/api" }

[rpc_endpoints]
unichain_sepolia = "${UNICHAIN_SEPOLIA_RPC}"
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC}"
# Base Sepolia hosts the canonical Uniswap v4 PoolManager and a live Chainlink ETH/USD feed, used by the
# fork tests to read real on-chain infra.
base_sepolia = "${BASE_SEPOLIA_RPC}"
# Reactive Network Lasna Omni testnet (chain id 5318007, Omni fork 2026-05-25).
# Default RPC: https://lasna-omni-rpc.rnk.dev  Explorer: https://lasna-omni.reactscan.net
reactive_lasna = "${REACTIVE_LASNA_RPC}"
