<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="STRATUM demo video thumbnail — click to watch">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#0d1a2e"/>
    </linearGradient>
    <linearGradient id="senior-glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a4a8a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1a3a5c" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="junior-glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e5c3a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2d4a3e" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="play-shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#4a9eff" flood-opacity="0.45"/>
    </filter>
    <filter id="text-glow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#4a9eff" flood-opacity="0.3"/>
    </filter>
    <symbol id="logo-mark" viewBox="0 0 32 32">
      <rect x="4" y="5" width="24" height="6" rx="2" fill="#ffffff"/>
      <rect x="4" y="13" width="24" height="6" rx="2" fill="#8888aa"/>
      <rect x="4" y="21" width="16" height="6" rx="2" fill="#555577"/>
    </symbol>
  </defs>

  <!-- background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- subtle grid lines -->
  <line x1="0" y1="180" x2="1280" y2="180" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="360" x2="1280" y2="360" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="540" x2="1280" y2="540" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="320" y1="0" x2="320" y2="720" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="720" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>

  <!-- tranche strata bars at bottom -->
  <rect x="0" y="596" width="1280" height="62" fill="url(#senior-glow)"/>
  <rect x="0" y="658" width="1280" height="62" fill="url(#junior-glow)"/>
  <text x="40" y="637" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="#7ab3f0" opacity="0.85">stLP  Senior tranche — fixed yield, IL protected</text>
  <text x="40" y="698" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="#7acfa0" opacity="0.85">jtLP  Junior tranche — leveraged fees, first-loss buffer</text>

  <!-- logo mark + wordmark top-left -->
  <use href="#logo-mark" x="64" y="52" width="44" height="44"/>
  <text x="120" y="86" font-family="Inter, SF Pro Display, system-ui, sans-serif" font-size="36" font-weight="700" fill="#ffffff" letter-spacing="2" opacity="0.92">STRATUM</text>

  <!-- live badge top-right -->
  <rect x="1100" y="52" width="140" height="36" rx="18" fill="#1a5c3a" opacity="0.85"/>
  <circle cx="1124" cy="70" r="5" fill="#3ddc84"/>
  <text x="1136" y="76" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#3ddc84">Live on Unichain</text>

  <!-- centre: play button -->
  <circle cx="640" cy="310" r="72" fill="#ffffff" fill-opacity="0.07" filter="url(#play-shadow)"/>
  <circle cx="640" cy="310" r="72" fill="none" stroke="#4a9eff" stroke-width="2.5" stroke-opacity="0.7"/>
  <!-- play triangle -->
  <polygon points="624,278 624,342 680,310" fill="#ffffff" opacity="0.95"/>

  <!-- centre: headline below play button -->
  <text x="640" y="436" text-anchor="middle" font-family="Inter, SF Pro Display, system-ui, sans-serif" font-size="46" font-weight="700" fill="#ffffff" letter-spacing="-1" filter="url(#text-glow)">Demo walkthrough</text>
  <text x="640" y="488" text-anchor="middle" font-family="Inter, SF Pro Text, system-ui, sans-serif" font-size="22" font-weight="400" fill="#8899bb">Uniswap v4 credit tranching hook — end-to-end on-chain</text>

  <!-- watermark logo mark bottom-right -->
  <use href="#logo-mark" x="1090" y="420" width="140" height="140" opacity="0.06"/>
</svg>
